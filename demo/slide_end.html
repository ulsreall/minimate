<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #09090B; color: #FAFAFA; width: 390px; height: 844px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.logo { font-size: 64px; margin-bottom: 16px; }
h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.sub { font-size: 14px; color: #A1A1AA; margin-bottom: 32px; }
.features { text-align: left; margin-bottom: 32px; }
.features div { font-size: 14px; margin-bottom: 10px; color: #A1A1AA; }
.features div span { color: #35D07F; font-weight: 600; }
.url { background: #35D07F; color: #09090B; padding: 16px 32px; border-radius: 12px; font-size: 16px; font-weight: 700; }
.github { color: #A1A1AA; font-size: 12px; margin-top: 16px; }
</style>
</head>
<body>
<div class="logo">🤖</div>
<h1>Try MiniMate Now</h1>
<p class="sub">Chat with your money on Celo</p>
<div class="features">
  <div>✅ <span>Balance</span> — Real-time on-chain</div>
  <div>✅ <span>Spending</span> — Auto-categorized</div>
  <div>✅ <span>Goals</span> — Track progress</div>
  <div>✅ <span>Send</span> — 3-step payment</div>
  <div>✅ <span>Gas</span> — Paid in USDm</div>
</div>
<div class="url">minimate-green.vercel.app</div>
<p class="github">github.com/ulsreall/minimate</p>
</body>
</html>
