<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #09090B; color: #FAFAFA; width: 390px; height: 844px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.logo-wrap { width: 64px; height: 64px; border-radius: 16px; overflow: hidden; margin-bottom: 16px; }
.logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
.sub { font-size: 14px; color: #A1A1AA; margin-bottom: 28px; }
.features { text-align: left; margin-bottom: 28px; }
.features div { font-size: 13px; margin-bottom: 10px; color: #A1A1AA; }
.features div span { color: #35D07F; font-weight: 600; }
.cta { background: #35D07F; color: #09090B; padding: 16px 32px; border-radius: 14px; font-size: 15px; font-weight: 700; }
.github { color: #52525B; font-size: 12px; margin-top: 14px; }
</style>
</head>
<body>
<div class="logo-wrap"><img src="https://minimate-green.vercel.app/logo.png" alt="MiniMate"></div>
<h1>Try MiniMate Now</h1>
<p class="sub">Chat with your money on Celo</p>
<div class="features">
  <div>✅ <span>Balance</span> — Real-time on-chain data</div>
  <div>✅ <span>Spending</span> — Auto-categorized breakdown</div>
  <div>✅ <span>Goals</span> — Track savings progress</div>
  <div>✅ <span>Send</span> — 3-step guided payment</div>
  <div>✅ <span>Gas</span> — Paid in USDm, no CELO needed</div>
</div>
<div class="cta">minimate-green.vercel.app</div>
<p class="github">github.com/ulsreall/minimate</p>
</body>
</html>
