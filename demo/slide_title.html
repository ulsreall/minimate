<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #09090B; color: #FAFAFA; width: 390px; height: 844px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.logo { font-size: 72px; margin-bottom: 16px; }
h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
.tagline { font-size: 16px; color: #A1A1AA; margin-bottom: 32px; max-width: 280px; line-height: 1.5; }
.badges { display: flex; gap: 8px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
.badge { background: #1A1A1E; border: 1px solid #27272A; border-radius: 20px; padding: 8px 16px; font-size: 12px; color: #A1A1AA; }
.badge.green { border-color: #35D07F; color: #35D07F; }
.url { color: #35D07F; font-size: 14px; font-weight: 600; margin-top: 20px; }
</style>
</head>
<body>
<div class="logo">🤖</div>
<h1>MiniMate</h1>
<p class="tagline">AI-powered finance assistant on Celo — built for MiniPay</p>
<div class="badges">
  <span class="badge green">MiniPay</span>
  <span class="badge green">Celo</span>
  <span class="badge">10M+ Users</span>
  <span class="badge">Fee Abstraction</span>
</div>
<p class="url">minimate-green.vercel.app</p>
</body>
</html>
